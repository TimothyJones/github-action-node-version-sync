# Copy this into a consuming repository at .github/workflows/node-version-sync.yml
name: Keep Node Current
on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: TimothyJones/github-action-keep-node-current@v1
        with:
          # Recommended: authenticate as a GitHub App (short-lived token, nothing to
          # rotate). The App needs Contents / Pull requests / Workflows: write.
          app-id: ${{ vars.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_KEY }}
          # Fallback: a PAT with repo + workflow scopes, via `token: ${{ secrets.SYNC_PAT }}`.
          # The default GITHUB_TOKEN cannot modify files under .github/workflows/.
